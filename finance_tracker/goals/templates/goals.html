{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals</title>
    <link rel="stylesheet" href="{% static 'side-bar.css' %}">
    <link rel="stylesheet" href="{% static 'goals.css' %}">
</head>

<body>
    <div class="app">
        <aside id="sidebar"></aside>
        <div class="main">
            
            <nav class="topbar">
                <div class="page-title">Financial Goals</div>
                <div class="avatar"></div>
            </nav>

            <div class="content">
                <div class="form-card">
                    <h2>➕ Add New Goal</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="goalName">Goal Name</label>
                            <input type="text" id="goalName" placeholder="e.g. Emergency Fund">
                            <span class="error-msg" id="nameError">Please enter a goal name</span>
                        </div>

                        <div class="form-group" style="grid-column: span 2;">
                            <label for="goalDescription">Description</label>
                            <textarea id="goalDescription" placeholder="Write a short description..." rows="3"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="goalTarget">Target Amount</label>
                            <div style="display: flex; gap: 5px;">
                                <input type="number" id="goalTarget" placeholder="e.g. 5000" min="1" style="flex: 3;">
                                <select id="currency" style="flex: 1;">
                                    <option value="USD">USD</option>
                                    <option value="EGP">EGP</option>
                                </select>
                            </div>
                            <span class="error-msg" id="targetError">Please enter a valid amount</span>
                        </div>

                        <div class="form-group">
                            <label for="goalCurrent">Current Amount</label>
                            <input type="number" id="goalCurrent" placeholder="e.g. 1200" min="0">
                            <span class="error-msg" id="currentError">Cannot exceed target amount</span>
                        </div>

                        <div class="form-group">
                            <label for="goalDeadline">Deadline</label>
                            <input type="date" id="goalDeadline">
                            <span class="error-msg" id="deadlineError">Please select a deadline</span>
                        </div>

                        <div class="form-group">
                            <label for="goalCategory">Category</label>
                            <select id="goalCategory">
                                <option value="emergency">Emergency</option>
                                <option value="travel">Travel</option>
                                <option value="education">Education</option>
                                <option value="shopping">Shopping</option>
                                <option value="investment">Investment</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="goalPriority">Priority</label>
                            <select id="goalPriority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>    
                    </div>
                    <button class="btn-add" onclick="addGoal()">Add Goal</button>
                </div>

                <div class="goals-section">
                    <h2>🎯 My Goals</h2>
                    <div class="empty-state" id="emptyState">
                        <p>No goals yet. Add your first goal above!</p>
                    </div>
                    <div class="goals-grid" id="goalsGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Fintrack. All rights reserved.</p>
    </footer>

    <script src="../js_files/side-bar.js"></script>
</body>

</html>
