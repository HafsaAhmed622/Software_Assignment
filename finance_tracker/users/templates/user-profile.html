{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
   <link rel="stylesheet" href="{% static 'side-bar.css' %}">
    <link rel="stylesheet" href="{% static 'profile.css' %}">
</head>

<body>
    <div class="app">
        <aside id="sidebar"></aside>

        <div class="main">
            <nav class="topbar">
                <div class="page-title">User Profile</div>
                <div class="avatar"></div>
            </nav>

         


    <div class="content profile-grid">
    <div class="profile-header-card stat-card">

        <div class="avatar-group">
            <div class="avatar-container">
                <div class="avatar-large" id="profile-pic">👤</div>
                <input type="file" id="avatar-upload" hidden accept="image/*">
            </div>

            <div class="header-text">
                <h2 id="display-name-header">User Name</h2>
                <p class="job-title" id="display-job-header">Full Stack Developer</p>
                <button class="btn-text-only" id="change-avatar-btn">Change Avatar</button>
            </div>

            
        </div>
    </div>
  

    </form>

    <div class="profile-col">
        <section class="stat-card">
            <div class="card-header">
                <h3>General Information</h3>
                <button id="save-general-btn" class="btn-primary-small">Save Changes</button>
            </div>
            
            <form id="general-info-form" class="info-grid">
                <div class="info-item">
                    <label for="input-fname">First Name</label>
                    <input type="text" id="input-fname" class="profile-input">
                </div>
                <div class="info-item">
                    <label for="input-lname">Last Name</label>
                    <input type="text" id="input-lname" class="profile-input">
                </div>
                  <form id="general-info-form" class="info-grid">
    <div class="info-item">
        <label for="input-job">Job Title</label>
        <input type="text" id="input-job" class="profile-input" placeholder="e.g. Software Engineer">
    </div>
                <div class="info-item">
                    <label for="input-phone">Phone Number</label>
                    <input type="text" id="input-phone" class="profile-input">
                </div>
           
                
                <div class="info-item">
                    <label for="input-country">Country</label>
                    <input type="text" id="input-country" class="profile-input">
                </div>
                
                <div class="info-item">
                    <label for="input-city">City</label>
                    <input type="text" id="input-city" class="profile-input">
                </div>

                <div class="info-item full-width">
                    <label for="input-email">Email Address</label>
                    <input type="email" id="input-email" class="profile-input">
                </div>
                     <div class="info-item">
                    <label>ID</label>
                    <p class="static-id">FT-2026-04</p>
                </div>
            </form>
        </section>
    </div>

    <div class="profile-col">
        <section class="stat-card">
            <div class="card-header">
                <h3>Account Options</h3>
            </div>
            <div class="form-group-static">
                <label>Language</label>
                <select class="profile-select">
                    <option>English</option>
                    <option>Arabic</option>
                </select>
            </div>
           <div class="account-actions">
    <button class="btn-danger-link" id="close-account-btn">Close your account</button>
</div>
        </section>
    </div>
</div>


    <footer class="footer">
        <p>© 2026 Fintrack. All rights reserved.</p>
    </footer>

    <script src="{% static 'side-bar.js' %}"></script>
    <script src="{% static 'profile.js' %}"></script>
</body>

</html>
