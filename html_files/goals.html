<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals</title>
    <link rel="stylesheet" href="../css_files/side-bar.css">
    <link rel="stylesheet" href="../css_files/goals.css">
</head>

<body>
    <div class="app">
        <aside id="sidebar"></aside>
        <div class="main">
            
            <nav class="topbar">
                <div class="page-title">Financial Goals</div>
                <div class="avatar"></div>
            </nav>

            <div class="content">
                <div class="form-card">
                    <h2>➕ Add New Goal</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="goalName">Goal Name</label>
                            <input type="text" id="goalName" placeholder="e.g. Emergency Fund">
                            <span class="error-msg" id="nameError">Please enter a goal name</span>
                        </div>
                        <div class="form-group">
                            <label for="goalTarget">Target Amount ($)</label>
                            <input type="number" id="goalTarget" placeholder="e.g. 5000" min="1">
                            <span class="error-msg" id="targetError">Please enter a valid amount</span>
                        </div>
                        <div class="form-group">
                            <label for="goalCurrent">Current Amount ($)</label>
                            <input type="number" id="goalCurrent" placeholder="e.g. 1200" min="0">
                            <span class="error-msg" id="currentError">Cannot exceed target amount</span>
                        </div>
                        <div class="form-group">
                            <label for="goalDeadline">Deadline</label>
                            <input type="date" id="goalDeadline">
                            <span class="error-msg" id="deadlineError">Please select a deadline</span>
                        </div>
                    </div>
                    <button class="btn-add" onclick="addGoal()">Add Goal</button>
                </div>

                <!-- Goals List -->
                <div class="goals-section">
                    <h2>🎯 My Goals</h2>
                    <div class="empty-state" id="emptyState">
                        <p>No goals yet. Add your first goal above!</p>
                    </div>
                    <div class="goals-grid" id="goalsGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Fintrack. All rights reserved.</p>
    </footer>

    <script src="../js_files/side-bar.js"></script>
</body>

</html>
