<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css_files/side-bar.css">
    <link rel="stylesheet" href="../css_files/register.css">
</head>

<body>
    <div class="app">
        <aside id="sidebar"></aside>
        <div class="main">
            
            <nav class="topbar">
                <div class="page-title">Sign Up</div>
                <div class="avatar"></div>
            </nav>

          <div class="content">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p class="auth-subtitle">Join Fintrack to start managing your budget</p>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Sign Up</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>
</div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Fintrack. All rights reserved.</p>
    </footer>

    <script src="../js_files/side-bar.js"></script>
    <script src="../js_files/register.js"></script>
</body>

</html>
