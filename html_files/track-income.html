<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Income</title>
    <link rel="stylesheet" href="../css_files/side-bar.css">
    <link rel="stylesheet" href="../css_files/tracker.css">
</head>

<body>
    <div class="app">
        <aside id="sidebar"></aside>

        <div class="main">

            <nav class="topbar">
                <div class="page-title">Track Income</div>
                <div class="avatar"></div>
            </nav>

            <div class="content">

                <!-- Add Income -->
                <div class="card">
                    <h2>Add Income</h2>

                    <form method="POST">

                        <!-- Amount -->
                        <label>Amount</label>
                        <input type="number" name="amount" required min="0">

                        <!-- Source -->
                        <label>Source</label>
                        <input type="text" name="source" required>

                        <!-- Payment Method -->
                        <label>Payment Method</label>
                        <select name="payment_method">
                            <option value="cash">Cash</option>
                            <option value="bank">Bank</option>
                            <option value="wallet">Wallet</option>
                        </select>

                        <!-- Notes -->
                        <label>Notes</label>
                        <textarea name="notes"></textarea>

                        <!-- Date -->
                        <label>Date</label>
                        <input type="date" name="date" required>

                        <!-- Recurring -->
                        <label>
                            <input type="checkbox" name="recurring">
                            Recurring Income
                        </label>

                        <button type="submit">Add Income</button>

                    </form>
                </div>

                <!-- Income History -->
                <div class="card">
                    <h2>Income History</h2>

                    <table>
                        <thead>
                            <tr>
                                <th>Amount</th>
                                <th>Source</th>
                                <th>Payment</th>
                                <th>Notes</th>
                                <th>Date</th>
                                <th>Recurring</th>
                            </tr>
                        </thead>

                        <tbody>
                            <!-- Data later -->
                        </tbody>
                    </table>

                </div>

            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Fintrack. All rights reserved.</p>
    </footer>

    <script src="../js_files/side-bar.js"></script>
</body>

</html>
