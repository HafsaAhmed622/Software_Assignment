<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Expenses</title>
    <link rel="stylesheet" href="../css_files/side-bar.css">
    <link rel="stylesheet" href="../css_files/tracker.css">
</head>

<body>
    <div class="app">
        <aside id="sidebar"></aside>
        <div class="main">
            
            <nav class="topbar">
                <div class="page-title">Track Expenses</div>
                <div class="avatar"></div>
            </nav>

            <div class="content">

    <!-- Add Expense -->
    <div class="card">
        <h2>Add Expense</h2>

        <form>

            <!-- Amount -->
            <label>Amount</label>
            <input type="number" required min="0">

            <!-- Category -->
            <label>Category</label>
            <input type="text" placeholder="e.g. Food, Transport..." required>

            <!-- Payment Method -->
            <label>Payment Method</label>
            <select required>
                <option value="">Select Method</option>
                <option>Cash</option>
                <option>Credit Card</option>
                <option>Wallet</option>
            </select>

            <!-- Notes -->
            <label>Notes</label>
            <input type="text" placeholder="Optional...">

            <!-- Date -->
            <label>Date</label>
            <input type="date" required>

            <button type="submit">Add Expense</button>

        </form>
    </div>

    <!-- Expense Table -->
    <div class="card">
        <h2>Expense History</h2>

        <table>
            <thead>
                <tr>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Payment</th>
                    <th>Notes</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
                <!-- Data later -->
            </tbody>
        </table>
    </div>

</div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 Fintrack. All rights reserved.</p>
    </footer>

    <script src="../js_files/side-bar.js"></script>
</body>

</html>
